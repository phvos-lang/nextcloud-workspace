<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Card / terminal window -->
  <rect x="4" y="10" width="56" height="44" rx="7" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect x="4" y="10" width="56" height="14" rx="7" fill="#313244"/>
  <rect x="4" y="17" width="56" height="7" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="15" cy="17" r="3" fill="#ff5f57"/>
  <circle cx="24" cy="17" r="3" fill="#febc2e"/>
  <circle cx="33" cy="17" r="3" fill="#28c840"/>
  <!-- Prompt line 1 -->
  <text x="10" y="36" font-family="monospace" font-size="9" fill="#89dceb">$</text>
  <rect x="17" y="29" width="18" height="2.5" rx="1.2" fill="#cdd6f4" opacity="0.7"/>
  <!-- Cursor blink -->
  <rect x="37" y="29" width="4" height="7" rx="1" fill="#89b4fa" opacity="0.9"/>
  <!-- Prompt line 2 -->
  <rect x="10" y="39" width="28" height="2.5" rx="1.2" fill="#a6e3a1" opacity="0.5"/>
  <!-- SSH arrow / pilot chevron -->
  <path d="M44 42 L56 32 L44 22" stroke="#89b4fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="36" y1="32" x2="54" y2="32" stroke="#89b4fa" stroke-width="3" stroke-linecap="round"/>
</svg>
