worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # WebSocket Connection header — send "upgrade" only on actual upgrade requests
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Per-session traffic log — mtail turns this into Prometheus byte counters.
    log_format lwp_sess 'lwp_sess sent=$bytes_sent recv=$request_length';

    # Docker's embedded DNS — required for runtime resolution of dynamic proxy_pass variables
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Upstream services ────────────────────────────────────────────────────

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:5173; }

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main server (HTTPS) ──────────────────────────────────────────────────

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         SAMEORIGIN;
        add_header Referrer-Policy         strict-origin-when-cross-origin;

        # ── API ────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Session proxy (KasmVNC / app container) ────────────────────────
        # auth_request validates session token, returns pod upstream in header.
        # Strip /session/<token>/ prefix — xpra (and other apps) serve at /.
        location ~ ^/session/(?<session_token>[^/]+) {
            access_log          /var/log/nginx/session.log lwp_sess;
            auth_request        /api/sessions/validate;
            auth_request_set    $session_upstream $upstream_http_x_session_upstream;
            error_page 401 = @session_auth_error;

            rewrite ^/session/[^/]+/(.*) /$1 break;
            rewrite ^/session/[^/]+/?$   / break;

            proxy_pass          https://$session_upstream;
            proxy_ssl_verify    off;
            proxy_ssl_session_reuse on;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade        $http_upgrade;
            proxy_set_header    Connection     $connection_upgrade;
            proxy_set_header    Host           $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_set_header    X-Session-Token $session_token;
            proxy_set_header    Authorization  "Basic bHdwOmx3cHZuYw==";
            proxy_set_header    Accept-Encoding "";
            proxy_hide_header   X-Frame-Options;
            proxy_hide_header   Content-Security-Policy;
            proxy_hide_header   Cross-Origin-Embedder-Policy;
            proxy_hide_header   Cross-Origin-Opener-Policy;

            sub_filter_types text/html;
            sub_filter_once  on;
            sub_filter "<head>" "<head><script>!function(){var _W=window.WebSocket,P='/websockify';function S(u,p){if(u.indexOf(P)!==-1&&u.indexOf('/session/')===-1)u=u.replace(P,'/session/$session_token'+P);return p?new _W(u,p):new _W(u);}S.prototype=_W.prototype;S.CONNECTING=0;S.OPEN=1;S.CLOSING=2;S.CLOSED=3;window.WebSocket=S;try{localStorage.setItem('novnc-resize_session','true');localStorage.setItem('novnc-scale_viewport','false');}catch(e){}try{if(navigator.keyboard&&navigator.keyboard.lock){var _kl=navigator.keyboard.lock.bind(navigator.keyboard);navigator.keyboard.lock=function(){try{var r=_kl.apply(this,arguments);return r&&r.catch?r.catch(function(){}):r}catch(e){return Promise.resolve()}}}}catch(e){}}();</script>";
        }

        location @session_auth_error {
            return 302 /?session_expired=1;
        }

        location = /api/sessions/validate {
            internal;
            proxy_pass          http://backend;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Session-Token   $session_token;
            proxy_pass_request_body off;
            proxy_set_header    Content-Length    "";
        }

        # ── Frontend (Vite dev server + HMR) ──────────────────────────────
        location / {
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection $connection_upgrade;
            proxy_set_header    Host       $host;
        }
    }
}
