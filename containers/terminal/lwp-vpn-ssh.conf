# Route ssh through the local VPN relay automatically when this session was
# launched behind the per-user gateway (LWP_VPN_PROXY set by the orchestrator).
# The relay (127.0.0.1:1081) goes direct or via the tunnel depending on the
# window's VPN toggle. Bypass for a single host: ssh -o ProxyCommand=none <host>
Match exec "env | grep -q ^LWP_VPN_PROXY="
    ProxyCommand nc -X 5 -x 127.0.0.1:1081 %h %p
