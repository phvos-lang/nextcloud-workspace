[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=warn
pidfile=/tmp/supervisord.pid

[program:lwp-kasm]
command=/usr/local/bin/lwp-start-kasm.sh
user=root
autorestart=unexpected
exitcodes=0
startsecs=3
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[include]
files=/etc/supervisor/conf.d/*.conf
