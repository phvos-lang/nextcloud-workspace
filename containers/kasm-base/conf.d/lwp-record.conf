[program:lwp-record]
; Records the session display when LWP_RECORD=1 (group policy); exits 0 otherwise.
environment=HOME="/home/lwp",USER="lwp"
command=/usr/local/bin/lwp-record.sh
autorestart=unexpected
exitcodes=0
startsecs=3
priority=300
user=lwp
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
