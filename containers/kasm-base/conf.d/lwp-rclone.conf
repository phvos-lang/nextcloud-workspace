[program:lwp-rclone]
; Mounts Nextcloud when LWP_NC_URL is set; sleeps indefinitely otherwise.
environment=HOME="/home/lwp",USER="lwp"
command=/usr/local/bin/lwp-nc-mount.sh
autorestart=unexpected
exitcodes=0
startsecs=3
priority=100
user=lwp
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
