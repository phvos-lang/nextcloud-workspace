# PulseAudio config for container audio
# Loads a null sink so apps always have somewhere to send audio,
# and KasmVNC streams it to the browser via Web Audio API.

.fail

# Pin rate/format to 48kHz stereo s16le so KasmVNC's parec monitor capture
# doesn't resample (resampling = crackle/choppy audio in the browser).
load-module module-null-sink sink_name=default_sink rate=48000 channels=2 format=s16le sink_properties=device.description=VirtualSink
set-default-sink default_sink

load-module module-null-source source_name=default_source source_properties=device.description=VirtualMic
set-default-source default_source

load-module module-native-protocol-unix socket=/run/user/1000/pulse/native
